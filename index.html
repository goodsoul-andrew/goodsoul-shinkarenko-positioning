<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Практика позиционирования</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <img class="logo" src="./designs/logo1.png" alt="logo1">
    <img class="logo" src="./designs/logo2.png" alt="logo1">
    <script src="index.js"></script>
<img id="logo" src="./designs/logo1.png" alt="logo1">

<button id="openModalBtn" class="open-btn">Открыть модальное окно</button>

<div id="overlay" class="overlay hidden">
    <div class="modal">
        <button id="closeModalBtn" class="close-btn" aria-label="Закрыть модальное окно">
            &times;
        </button>

        <h2 class="modal-title">Модальное окно</h2>
        <p class="modal-text">
            пупупу
        </p>
    </div>
</div>

<script src="index.js"></script>
